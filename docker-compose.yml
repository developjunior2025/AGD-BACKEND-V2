services:
  mysql:
    image: mysql:8.4
    container_name: agd-backend-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agd_backend
      MYSQL_USER: agd
      MYSQL_PASSWORD: agd
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - agd_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agd_mysql_data:
